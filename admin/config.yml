backend:
  name: git-gateway
  branch: main
media_folder: "images"
public_folder: "images"

collections:
  - name: "pages"
    label: "Website Content"
    files:
      - file: "index.html"
        label: "Main Homepage"
        name: "home"
        format: "frontmatter"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Description", name: "hero_desc", widget: "text"}
          - {label: "Hero Image", name: "hero_image", widget: "image"}
          - {label: "About Section Text", name: "about_text", widget: "text"}
          - {label: "Mission Statement", name: "mission_text", widget: "text"}
          - {label: "Vision Statement", name: "vision_text", widget: "text"}
          - {label: "Disclaimer Notice", name: "disclaimer_notice", widget: "text"}
          - {label: "Contact Phone", name: "contact_phone", widget: "string"}
          - {label: "Contact Email", name: "contact_email", widget: "string"}
