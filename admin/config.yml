backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "home"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Subtext", name: "hero_text", widget: "text"}
          - {label: "About Section Body", name: "about_body", widget: "markdown"}
          - {label: "Mission Statement", name: "mission_text", widget: "text"}
          - {label: "Vision Statement", name: "vision_text", widget: "text"}
          - {label: "Contact Email", name: "contact_email", widget: "string"}
          - {label: "Contact Phone", name: "contact_phone", widget: "string"}
