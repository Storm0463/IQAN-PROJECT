backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

collections:
  - name: "pages"
    label: "Website Content"
    files:
      - file: "index.html"
        label: "Home Page"
        name: "home"
        format: "frontmatter"
        fields:
          - {label: "Hero Title", name: "hero_title", widget: "string"}
          - {label: "Hero Description", name: "hero_desc", widget: "text"}
          - {label: "Hero Image", name: "hero_img", widget: "image"}
          - label: "Latest Updates"
            name: "updates"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Image", name: "image", widget: "image"}
              - {label: "Summary", name: "body", widget: "text"}
