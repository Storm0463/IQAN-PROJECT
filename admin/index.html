<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager Preview</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <script>
    // This tells the editor how to display your "Home" section
    CMS.registerPreviewTemplate("home", createClass({
      render: function() {
        var entry = this.props.entry;
        var title = entry.getIn(['data', 'hero_title']);
        var desc = entry.getIn(['data', 'hero_desc']);
        var bg = entry.getIn(['data', 'hero_image']);

        return h('div', {},
          h('section', {
            style: {
              height: '400px',
              display: 'flex',
              alignItems: 'center',
              padding: '40px',
              color: 'white',
              backgroundImage: 'linear-gradient(rgba(7,27,70,0.8),rgba(7,27,70,0.8)), url(' + bg + ')',
              backgroundSize: 'cover',
              backgroundPosition: 'center',
              fontFamily: 'Poppins, sans-serif'
            }
          },
            h('div', {},
              h('h1', {style: {fontSize: '2.5rem', margin: '0'}}, title),
              h('p', {style: {fontSize: '1.2rem', marginTop: '10px'}}, desc)
            )
          )
        );
      }
    }));
  </script>
</body>
</html>
